# ============================================================
# Shadow Pages — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-worker-common: &worker-common
  build:
    context: ../services/worker
    dockerfile: Dockerfile
  env_file:
    - ../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
  volumes:
    - worker-tmp:/tmp/vre
  restart: always
  logging: *default-logging

services:
  # ---------- Infrastructure ----------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-vre_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-vre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vre_prod} -d ${POSTGRES_DB:-vre}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    logging: *default-logging

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    logging: *default-logging

  # ---------- API ----------

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    env_file:
      - ../.env
    environment:
      CLAUDE_BRIDGE_URL: "http://host.docker.internal:7777"
      CLAUDE_BRIDGE_MODEL: "sonnet"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    logging: *default-logging

  # ---------- Workers ----------

  worker-scraper:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.scrape,queue.discover,queue.analyze -c 4 -E --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  worker-downloader:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.download,queue.search -c 4 -E --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  worker-enhancer:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.enhance,queue.export -c 2 -E --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------- Celery Beat ----------

  celery-beat:
    <<: *worker-common
    command: celery -A celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------- Flower ----------

  flower:
    image: mher/flower:2.0
    environment:
      CELERY_BROKER_URL: ${REDIS_URL:-redis://redis:6379/0}
      FLOWER_UNAUTHENTICATED_API: "true"
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --port=5555 --url_prefix=flower --persistent=True --broker_api=${REDIS_URL:-redis://redis:6379/0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
    logging: *default-logging

  # ---------- Frontend ----------

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    logging: *default-logging

  # ---------- Reverse Proxy ----------

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - flower
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  minio-data:
  worker-tmp:
  certbot-webroot:
