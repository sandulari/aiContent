x-worker-common: &worker-common
  build:
    context: ../services/worker
    dockerfile: Dockerfile
  env_file:
    - ../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
  volumes:
    - worker-tmp:/tmp/vre
  restart: unless-stopped

services:
  # ---------- Infrastructure ----------

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-vre_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vre_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vre_user} -d ${POSTGRES_DB:-vre}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set vre http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin_secret};
      mc mb --ignore-existing vre/videos;
      mc mb --ignore-existing vre/logos;
      mc mb --ignore-existing vre/audio;
      mc mb --ignore-existing vre/exports;
      echo 'Buckets created successfully';
      "
    env_file:
      - ../.env

  # ---------- API ----------

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Claude bridge runs on the host and shells out to the `claude` CLI
      # (authenticated via the user's Claude Max subscription). The API
      # container reaches it via Docker's host-gateway alias.
      CLAUDE_BRIDGE_URL: "http://host.docker.internal:7777"
      CLAUDE_BRIDGE_MODEL: "sonnet"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Workers ----------

  worker-scraper:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.scrape,queue.discover,queue.analyze -c 4 -E --loglevel=info

  worker-downloader:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.download,queue.search -c 4 -E --loglevel=info

  worker-enhancer:
    <<: *worker-common
    command: celery -A celery_app worker -Q queue.enhance,queue.export -c 2 -E --loglevel=info

  # ---------- Celery Beat ----------

  celery-beat:
    <<: *worker-common
    command: celery -A celery_app beat --loglevel=info

  # ---------- Flower ----------

  flower:
    image: mher/flower:2.0
    environment:
      CELERY_BROKER_URL: ${REDIS_URL:-redis://redis:6379/0}
      FLOWER_UNAUTHENTICATED_API: "true"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --port=5555 --url_prefix=flower --persistent=True --broker_api=redis://redis:6379/0
    restart: unless-stopped

  # ---------- Frontend ----------

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - api
    restart: unless-stopped

  # ---------- Reverse Proxy ----------

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - flower
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  worker-tmp:
