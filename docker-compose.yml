# ─────────────────────────────────────────────────────────────
# Shadow Pages — Railway Docker Compose deployment
# ─────────────────────────────────────────────────────────────
# Railway auto-detects this file and creates one service per entry.
# Set environment variables in the Railway dashboard.
# Docs: https://docs.railway.app/guides/docker-compose
# ─────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-vre_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vre_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set vre http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing vre/videos;
      mc mb --ignore-existing vre/logos;
      mc mb --ignore-existing vre/audio;
      mc mb --ignore-existing vre/exports;
      echo 'Buckets initialized';
      exit 0;
      "

  # ── Application services ───────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-vre_user}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-vre}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: "24"
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_URL: ${APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  worker-scraper:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vre_user}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-vre}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "worker", "-Q", "queue.scrape,queue.discover,queue.analyze", "-c", "4", "-E", "--loglevel=info"]

  worker-downloader:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vre_user}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-vre}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "worker", "-Q", "queue.download,queue.search", "-c", "4", "-E", "--loglevel=info"]

  worker-enhancer:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vre_user}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-vre}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "worker", "-Q", "queue.enhance,queue.export", "-c", "2", "-E", "--loglevel=info"]

  celery-beat:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vre_user}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-vre}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${APP_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL}
    depends_on:
      - api

  # ── Reverse proxy (public entry point) ─────────────────────
  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile.railway
    depends_on:
      - api
      - web

volumes:
  postgres-data:
  redis-data:
  minio-data:
