databases:
  - name: shadowpages-db
    plan: starter
    databaseName: vre
    user: vre_user
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  # ── Redis ──────────────────────────────────────────────────
  - type: redis
    name: shadowpages-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # ── API ────────────────────────────────────────────────────
  - type: web
    name: shadowpages-api
    runtime: docker
    plan: starter
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shadowpages-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shadowpages-redis
          type: redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: shadowpages-minio:9000
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: RAPIDAPI_KEY
        sync: false
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_OAUTH_REDIRECT_URI
        sync: false
      - key: META_GRAPH_VERSION
        value: v25.0
      - key: IG_TOKEN_ENC_KEY
        sync: false

  # ── Web Frontend ───────────────────────────────────────────
  - type: web
    name: shadowpages-web
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── MinIO (Object Storage) ────────────────────────────────
  - type: pserv
    name: shadowpages-minio
    runtime: image
    plan: starter
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 20
    image:
      url: minio/minio:latest
    dockerCommand: server /data --console-address :9001
    envVars:
      - key: MINIO_ROOT_USER
        sync: false
      - key: MINIO_ROOT_PASSWORD
        sync: false

  # ── Worker: Scraper ────────────────────────────────────────
  - type: worker
    name: shadowpages-worker-scraper
    runtime: docker
    plan: starter
    dockerfilePath: ./services/worker/Dockerfile
    dockerContext: ./services/worker
    dockerCommand: celery -A celery_app worker -Q queue.scrape,queue.discover,queue.analyze -c 4 -E --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shadowpages-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shadowpages-redis
          type: redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: shadowpages-minio:9000
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        value: "false"
      - key: RAPIDAPI_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Worker: Downloader ─────────────────────────────────────
  - type: worker
    name: shadowpages-worker-downloader
    runtime: docker
    plan: starter
    dockerfilePath: ./services/worker/Dockerfile
    dockerContext: ./services/worker
    dockerCommand: celery -A celery_app worker -Q queue.download,queue.search -c 4 -E --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shadowpages-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shadowpages-redis
          type: redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: shadowpages-minio:9000
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        value: "false"
      - key: RAPIDAPI_KEY
        sync: false

  # ── Worker: Enhancer + Exporter ────────────────────────────
  - type: worker
    name: shadowpages-worker-enhancer
    runtime: docker
    plan: standard
    dockerfilePath: ./services/worker/Dockerfile
    dockerContext: ./services/worker
    dockerCommand: celery -A celery_app worker -Q queue.enhance,queue.export,queue.publish -c 2 -E --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shadowpages-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shadowpages-redis
          type: redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: shadowpages-minio:9000
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        value: "false"
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_GRAPH_VERSION
        value: v25.0
      - key: IG_TOKEN_ENC_KEY
        sync: false

  # ── Celery Beat (Scheduler) ────────────────────────────────
  - type: worker
    name: shadowpages-celery-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./services/worker/Dockerfile
    dockerContext: ./services/worker
    dockerCommand: celery -A celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shadowpages-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shadowpages-redis
          type: redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: shadowpages-minio:9000
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        value: "false"
